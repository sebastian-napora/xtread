id = "xtread-code"
name = "Xtread Code"
version = "0.1.0"
schema_version = 1
authors = ["Qwen Team"]
description = "Xtread Code Agent Server Extension for Zed"
repository = "https://github.com/QwenLM/xtread-code"

[agent_servers.xtread-code]
name = "Xtread Code"
icon = "xtread-code.svg"

[agent_servers.xtread-code.targets.darwin-aarch64]
archive = "https://registry.npmjs.org/@xtread-code/xtread-code/-/xtread-code-0.10.0.tgz"
cmd = "node"
args = ["./package/cli.js", "--acp"]

[agent_servers.xtread-code.targets.darwin-x86_64]
archive = "https://registry.npmjs.org/@xtread-code/xtread-code/-/xtread-code-0.10.0.tgz"
cmd = "node"
args = ["./package/cli.js", "--acp"]

[agent_servers.xtread-code.targets.linux-x86_64]
archive = "https://registry.npmjs.org/@xtread-code/xtread-code/-/xtread-code-0.10.0.tgz"
cmd = "node"
args = ["./package/cli.js", "--acp"]

[agent_servers.xtread-code.targets.windows-x86_64]
archive = "https://registry.npmjs.org/@xtread-code/xtread-code/-/xtread-code-0.10.0.tgz"
cmd = "node"
args = ["./package/cli.js", "--acp"]

